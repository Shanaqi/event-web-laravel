<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VenueAdmin - Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift {
            background: linear-gradient(180deg, #f7f9fb 0%, #f2f4f6 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Header Section (Brand Identity) -->
<header class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container text-white mb-6 shadow-lg">
<span class="material-symbols-outlined text-3xl" data-icon="layers">layers</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter uppercase text-primary">
            VenueAdmin
        </h1>
<p class="text-on-surface-variant font-medium mt-2 tracking-tight">The Digital Concierge</p>
</header>
<!-- Main Login Canvas -->
<main class="w-full max-w-md">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_0_40px_rgba(0,0,0,0.06)] p-8 md:p-10">
<div class="mb-8">
<h2 class="text-xl font-bold text-on-surface mb-1">Welcome Back</h2>
<p class="text-on-surface-variant text-sm font-medium">Please sign in to manage your venue</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-outline" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary text-xl" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all duration-300 text-on-surface placeholder:text-outline/60 font-medium" id="email" name="email" placeholder="name@venue.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block text-xs font-bold uppercase tracking-widest text-outline" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all duration-300 text-on-surface placeholder:text-outline/60 font-medium" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] transition-all duration-300 flex items-center justify-center space-x-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Secondary Actions & Footnote -->
<footer class="mt-10 text-center space-y-6">
<div class="flex items-center justify-center space-x-4">
<a class="flex items-center space-x-1.5 text-sm font-bold text-outline hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-lg" data-icon="help">help</span>
<span>Support</span>
</a>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<a class="flex items-center space-x-1.5 text-sm font-bold text-outline hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-lg" data-icon="gavel">gavel</span>
<span>Privacy Policy</span>
</a>
</div>
<!-- Contextual Decorative Asset -->
<div class="relative overflow-hidden rounded-xl h-24 w-full bg-surface-container-low flex items-center px-6">
<div class="absolute inset-0 opacity-10">
<img class="w-full h-full object-cover" data-alt="blurred luxury retail environment with soft ambient lighting and architectural geometric lines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDV7AfnGHaVcdHlpNj_Ponul8zMFEmECPDBVZJqAImHqKbFQUVifmRkAe3QflZLlYnQqgxkVk6JhCZHGbT9egcdbbL1rgoXnPF5fGcC4NnfXke7IjTepq-KEcC39DC5BebFv0q_FvTKecyAKoiWeTkBHfKB-uFTBNzajiXaIBg9C9yWrKIqLnsbrhYH742lCauauryxWa4hpzjmdIjvwfHnPXr7izd7_i1tpvK0zpOFk09B78DdSTszfIr0hfaqfjtEPyywjE0jX1M"/>
</div>
<div class="relative flex items-center space-x-4">
<div class="p-2 bg-white/50 rounded-lg">
<span class="material-symbols-outlined text-primary" data-icon="shield_with_heart">shield_with_heart</span>
</div>
<p class="text-[10px] text-outline text-left leading-tight font-medium uppercase tracking-wider">
                        Enterprise-grade security<br/>protected by VenueAdmin Cloud
                    </p>
</div>
</div>
</footer>
</main>
</body></html>
